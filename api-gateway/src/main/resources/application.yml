spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**,/api/v1/user/**

            - id: restaurant-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/restaurants/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info